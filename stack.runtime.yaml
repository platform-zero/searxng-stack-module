---
schemaVersion: 1
module: "searxng"
target: "apps"
services:
  searxng:
    image: "docker.io/searxng/searxng@sha256:3e838234031bfa106bd2b65633d7de3cc69106584740c572be7652e93a6bca52"
    containerName: "searxng"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootless"
    dependencies:
      caddy: "started"
    environment:
      SEARXNG_BASE_URL: "https://websearch.${DOMAIN}/"
      SEARXNG_SECRET: "${SEARXNG_SECRET}"
      FORCE_OWNERSHIP: false
    networks:
      caddy: null
    volumes:
    - "./configs/searxng:/etc/searxng:ro"
    - "searxng_cache:/var/cache/searxng"
    health:
      test:
      - "CMD-SHELL"
      - "wget -q --tries=1 --spider http://localhost:8080/ || exit 1"
      interval: "60s"
      timeout: "10s"
      retries: 3
      start_period: "30s"
    restart: "unless-stopped"
networks: {}
volumes:
  searxng_cache:
    hostPath: "${STACK_VOLUME_ROOT}/searxng_cache"
